<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coria del Río - Experiencia Interactiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #b45309;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2, .font-display {
            font-family: 'Playfair Display', serif;
        }

        /* Fondo Compartido: Portada y Resultados */
        .full-bg-image {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('https://sevilla.abc.es/contenidopromocionado/wp-content/uploads/sites/2/2023/03/coria-1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .app-window {
            width: 95vw;
            max-width: 860px;
            height: 520px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            z-index: 10;
        }

        .option-card {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }

        .option-card:hover:not(.disabled) {
            background-color: #f8fafc;
            transform: translateX(4px);
            border-left-color: var(--accent);
        }

        .option-card.correct {
            background-color: #f0fdf4 !important;
            border-left-color: #22c55e !important;
            color: #166534 !important;
        }

        .option-card.wrong {
            background-color: #fef2f2 !important;
            border-left-color: #ef4444 !important;
            color: #991b1b !important;
        }

        /* Pantallas */
        .screen {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        .content-fade {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .content-fade.out {
            opacity: 0;
            transform: translateY(-8px);
        }

        .q-image-container {
            transition: opacity 0.4s ease;
            background-color: #e2e8f0;
        }

        /* Tarjeta de Resultados con efecto Glass */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- PORTADA PANTALLA COMPLETA -->
    <div id="start-screen" class="full-bg-image z-[100]">
        <div class="p-6">
            <h1 class="text-5xl md:text-7xl mb-4 font-bold tracking-tight">Coria del Río</h1>
            <div class="w-20 h-1 bg-amber-500 mx-auto mb-8"></div>
            <p class="text-xl md:text-3xl mb-12 font-light italic opacity-90 tracking-tight">¡Es hora de demostrar lo aprendido!</p>
            <button onclick="quiz.start()" class="bg-white text-slate-900 px-12 py-5 rounded-full font-bold uppercase tracking-widest hover:bg-amber-500 hover:text-white transition-all shadow-2xl active:scale-95 text-lg">
                Comenzar el Reto
            </button>
        </div>
    </div>

    <div class="app-window">
        
        <!-- JUEGO -->
        <div id="quiz-screen" class="screen flex flex-col md:flex-row h-full">
            <!-- Imagen Lateral -->
            <div class="md:w-5/12 relative q-image-container hidden md:block">
                <img id="q-image" src="" alt="Coria" class="h-full w-full object-cover transition-opacity duration-500 opacity-0">
                <div class="absolute bottom-4 left-4 bg-black/40 backdrop-blur-md px-3 py-1 rounded-lg text-white text-[10px] font-bold uppercase tracking-widest">
                    Paso <span id="q-num">1</span> de 6
                </div>
            </div>

            <!-- Contenido -->
            <div id="quiz-content" class="md:w-7/12 p-8 md:p-10 flex flex-col justify-center content-fade">
                <div class="flex justify-between items-center mb-3">
                    <span id="q-title" class="text-[9px] font-bold text-amber-600 uppercase tracking-[0.2em]"></span>
                    <div class="bg-slate-100 px-3 py-1 rounded-full text-[10px] font-bold text-slate-500 uppercase tracking-tighter">
                        Puntos: <span id="score" class="text-slate-900">0</span>
                    </div>
                </div>

                <h3 id="q-text" class="text-lg md:text-xl font-bold mb-6 text-slate-800 leading-snug"></h3>

                <div id="options" class="space-y-2"></div>

                <!-- Feedback -->
                <div id="feedback" class="hidden mt-4 p-4 rounded-xl bg-red-50 border border-red-100">
                    <div class="flex gap-3">
                        <i class="fas fa-lightbulb text-red-400 mt-0.5 text-sm"></i>
                        <p id="feedback-txt" class="text-xs text-red-800 leading-relaxed font-medium"></p>
                    </div>
                    <button onclick="quiz.next()" class="mt-4 w-full bg-slate-900 text-white py-2.5 rounded-lg font-bold text-xs hover:bg-black transition-all">
                        Entendido, continuar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- PANTALLA DE RESULTADOS (OCULTA POR DEFECTO) -->
    <div id="results-screen" class="full-bg-image hidden z-[90]">
        <div class="glass-card max-w-sm w-full p-8 md:p-10 text-center rounded-[40px] shadow-2xl mx-4 text-slate-900">
            <div id="res-icon" class="text-6xl mb-4">🏆</div>
            <h2 id="res-title" class="text-4xl font-bold mb-2">¡Perfecto!</h2>
            
            <!-- Mensaje de Premio Simplificado -->
            <div id="prize-message" class="hidden mb-6 p-3 bg-amber-100 text-amber-900 rounded-2xl border border-amber-200 text-sm font-bold flex items-center justify-center gap-2 animate-bounce">
                <i class="fas fa-award"></i> ¡PREMIO!
            </div>

            <div class="flex gap-3 mb-8">
                <div class="flex-1 bg-white/50 p-4 rounded-2xl border border-slate-200">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Aciertos</p>
                    <p id="final-acc" class="text-3xl font-bold text-slate-800">0/6</p>
                </div>
                <div class="flex-1 bg-slate-900 p-4 rounded-2xl">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-1">Puntos</p>
                    <p id="final-pts" class="text-3xl font-bold text-white">0</p>
                </div>
            </div>

            <button onclick="quiz.reset()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm hover:bg-black transition-all shadow-lg active:scale-95">
                Reiniciar Reto
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                title: "1. Sistema de riego inteligente",
                q: "¿Qué problema busca resolver un sistema de riego automático basado en la humedad del suelo?",
                options: ["Aumentar el uso de fertilizantes", "Reducir el riego ineficiente, evitando desperdicios", "Sustituir la luz solar", "Eliminar plagas"],
                correct: 1,
                img: "https://images.unsplash.com/photo-1563514227147-6d2ff665a6a0?auto=format&fit=crop&q=80&w=800",
                info: "La respuesta correcta era reducir el riego ineficiente. Ahorrar agua es clave para la sostenibilidad local."
            },
            {
                title: "2. Farolas automáticas",
                q: "¿Para qué sirve que una farola se encienda solo cuando anochece?",
                options: ["Funcionar las 24 horas", "Ahorrar energía encendiéndose solo ante la falta de luz", "Detectar la lluvia", "Aumentar el consumo"],
                correct: 1,
                img: "https://static.vecteezy.com/system/resources/previews/003/196/111/non_2x/street-lamp-at-night-in-the-dark-free-photo.jpg",
                info: "Incorrecto. Se busca eficiencia energética al iluminar solo cuando la luz natural es insuficiente."
            },
            {
                title: "3. Reciclamos en Carlos de Mesa",
                q: "¿Qué ODS está más directamente relacionado con la gestión de residuos?",
                options: ["ODS 4: Educación", "ODS 12: Producción y consumo responsables", "ODS 5: Igualdad", "ODS 8: Trabajo"],
                correct: 1,
                img: "https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&q=80&w=800",
                info: "El ODS 12 fomenta la reducción de desechos mediante el reciclaje y un consumo consciente."
            },
            {
                title: "4. Tecnología que florece. Árbol con placas solares",
                q: "¿De qué manera las placas solares en forma de árbol ayudan a producir energía limpia?",
                options: ["Generando energía a partir del viento", "Captando la energía del sol mediante paneles solares y transformándola en electricidad", "Utilizando combustibles fósiles para producir energía", "Almacenando agua para generar energía"],
                correct: 1,
                img: "https://img.freepik.com/fotos-premium/paneles-solares-forma-arbol-tecnologias-modernas-paneles-solares-parque-grumos-hierro-no-arbol-real-diseno-parque-moderno_537001-4544.jpg",
                info: "Se trata de árboles fotovoltaicos que captan la radiación solar para generar electricidad limpia."
            },
            {
                title: "5. Energía bajo nuestros pies. Suelo piezoeléctrico",
                q: "¿Dónde sería ideal instalar un suelo piezoeléctrico para generar energía?",
                options: ["Zonas deshabitadas", "Estaciones o calles con alto tránsito de personas", "Bajo el río", "Huertos"],
                correct: 1,
                img: "https://www.platecma.com/wp-content/uploads/3-8.jpg",
                info: "Esta tecnología aprovecha la energía mecánica de las pisadas en lugares muy concurridos."
            },
            {
                title: "6. Conocemos Coria del Río",
                q: "¿Dónde se encuentra la estatua de Hasekura Tsunenaga en Coria del Río?",
                options: ["Plaza de la Soledad", "Paseo de Carlos Mesa", "Plaza de la Estrella", "Ermita de San Juan"],
                correct: 1,
                img: "https://upload.wikimedia.org/wikipedia/commons/a/ad/Monumento_a_Hasekura_Tsunenaga_4.JPG",
                info: "La estatua del samurái observa el Guadalquivir desde el Paseo Carlos Mesa, símbolo de la Expedición Keicho."
            }
        ];

        const quiz = {
            idx: 0,
            score: 0,
            corrects: 0,
            locked: false,

            start() {
                const startScreen = document.getElementById('start-screen');
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.classList.add('hidden');
                    document.getElementById('quiz-screen').classList.add('active');
                    this.render();
                }, 600);
            },

            render() {
                const q = questions[this.idx];
                const content = document.getElementById('quiz-content');
                const img = document.getElementById('q-image');
                
                content.classList.remove('out');
                document.getElementById('q-num').innerText = this.idx + 1;
                document.getElementById('q-title').innerText = q.title;
                document.getElementById('q-text').innerText = q.q;
                
                img.style.opacity = '0';
                setTimeout(() => {
                    img.src = q.img;
                    img.onload = () => img.style.opacity = '1';
                }, 200);
                
                document.getElementById('feedback').classList.add('hidden');
                const optionsDiv = document.getElementById('options');
                optionsDiv.innerHTML = '';

                const shuffled = q.options
                    .map((text, i) => ({ text, i }))
                    .sort(() => Math.random() - 0.5);

                shuffled.forEach(opt => {
                    const btn = document.createElement('div');
                    btn.className = 'option-card bg-white border border-slate-100 p-3.5 rounded-2xl cursor-pointer flex justify-between items-center text-xs font-medium shadow-sm';
                    btn.innerHTML = `<span>${opt.text}</span> <i class="far fa-circle text-slate-200 text-[10px]"></i>`;
                    btn.onclick = () => this.check(opt.i, btn);
                    optionsDiv.appendChild(btn);
                });
                
                this.locked = false;
            },

            check(selectedIdx, el) {
                if(this.locked) return;
                this.locked = true;

                const q = questions[this.idx];
                const cards = document.querySelectorAll('.option-card');
                
                if(selectedIdx === q.correct) {
                    el.classList.add('correct');
                    el.querySelector('i').className = 'fas fa-check-circle text-green-500';
                    this.score += 20;
                    this.corrects++;
                    document.getElementById('score').innerText = this.score;
                    setTimeout(() => this.next(), 700);
                } else {
                    el.classList.add('wrong');
                    el.querySelector('i').className = 'fas fa-times-circle text-red-500';
                    cards.forEach(c => {
                        if(c.querySelector('span').innerText === q.options[q.correct]) c.classList.add('correct');
                    });
                    document.getElementById('feedback').classList.remove('hidden');
                    document.getElementById('feedback-txt').innerText = q.info;
                }
            },

            next() {
                const content = document.getElementById('quiz-content');
                content.classList.add('out');

                setTimeout(() => {
                    this.idx++;
                    if(this.idx < questions.length) {
                        this.render();
                    } else {
                        this.showResults();
                    }
                }, 400);
            },

            showResults() {
                document.getElementById('quiz-screen').classList.remove('active');
                const resultsScreen = document.getElementById('results-screen');
                resultsScreen.classList.remove('hidden');
                resultsScreen.style.opacity = '1';
                
                document.getElementById('final-acc').innerText = `${this.corrects}/6`;
                document.getElementById('final-pts').innerText = this.score;

                const title = document.getElementById('res-title');
                const icon = document.getElementById('res-icon');
                const prize = document.getElementById('prize-message');

                if(this.corrects >= 5) this.triggerConfetti();

                if(this.corrects === 6) { 
                    title.innerText = "¡Perfecto!"; 
                    icon.innerText = "🏆"; 
                    prize.classList.remove('hidden');
                } else if(this.corrects >= 4) { 
                    title.innerText = "¡Muy bien!"; 
                    icon.innerText = "⭐"; 
                } else if(this.corrects >= 2) { 
                    title.innerText = "¡Bien hecho!"; 
                    icon.innerText = "📚"; 
                } else { 
                    title.innerText = "¡Ánimo!"; 
                    icon.innerText = "🌱"; 
                }
            },

            triggerConfetti() {
                const end = Date.now() + 3000;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#b45309', '#f59e0b', '#10b981'] });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#b45309', '#f59e0b', '#10b981'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            },

            reset() {
                this.idx = 0;
                this.score = 0;
                this.corrects = 0;
                this.locked = false;
                document.getElementById('score').innerText = '0';
                document.getElementById('prize-message').classList.add('hidden');
                
                const resultsScreen = document.getElementById('results-screen');
                resultsScreen.style.opacity = '0';
                setTimeout(() => {
                    resultsScreen.classList.add('hidden');
                    const startScreen = document.getElementById('start-screen');
                    startScreen.classList.remove('hidden');
                    startScreen.style.opacity = '1';
                }, 600);
            }
        };
    </script>
</body>
</html>
